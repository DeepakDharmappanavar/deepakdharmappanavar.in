<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: url('./Logo/MaintainceLogo.png') no-repeat center center;
        background-size: 90%;
        background-color: black;
        position: relative;
    }

    /* 🔴 PERFECT ROTATING GEAR (NO TEXT) */
    .gear {
        position: absolute;
        top: 68%;   /* adjust */
        left: 77%;  /* adjust */
        width: 27px;
        height: 27px;
        fill: red;
        animation: spin 1s linear infinite;
        transform-origin: center;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Top Right Buttons */
    .nav {
        position: absolute;
        top: 20px;
        right: 30px;
        display: flex;
        gap: 15px;
    }

    .nav button {
        padding: 10px 18px;
        border: none;
        border-radius: 25px;
        background: rgba(255, 0, 0, 0.15);
        color: white;
        cursor: pointer;
        backdrop-filter: blur(6px);
        transition: all 0.3s ease;
    }

    .nav button:hover {
        transform: translateY(-4px) scale(1.05);
        background: rgba(255, 0, 0, 0.6);
        box-shadow: 0 0 15px red;
    }

    /* Popup Modal */
    .modal {
        display: none;
        position: fixed;
        z-index: 100;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: #111;
        padding: 30px;
        border-radius: 15px;
        width: 300px;
        text-align: center;
        color: white;
        animation: fadeIn 0.4s ease;
    }

    .close {
        float: right;
        font-size: 20px;
        cursor: pointer;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }
</style>
</head>

<body>

<!-- 🔴 ONLY GEAR -->
<svg class="gear" viewBox="0 0 24 24">
    <path d="M19.14,12.94a7.49,7.49,0,0,0,.05-.94,7.49,7.49,0,0,0-.05-.94l2.11-1.65a.5.5,0,0,0,.12-.64l-2-3.46a.5.5,0,0,0-.6-.22l-2.49,1a7.28,7.28,0,0,0-1.63-.94l-.38-2.65A.5.5,0,0,0,13.78,2H10.22a.5.5,0,0,0-.49.41L9.35,5.06a7.28,7.28,0,0,0-1.63.94l-2.49-1a.5.5,0,0,0-.6.22l-2,3.46a.5.5,0,0,0,.12.64L4.86,11.06a7.49,7.49,0,0,0-.05.94,7.49,7.49,0,0,0,.05.94L2.75,14.59a.5.5,0,0,0-.12.64l2,3.46a.5.5,0,0,0,.6.22l2.49-1a7.28,7.28,0,0,0,1.63.94l.38,2.65a.5.5,0,0,0,.49.41h3.56a.5.5,0,0,0,.49-.41l.38-2.65a7.28,7.28,0,0,0,1.63-.94l2.49,1a.5.5,0,0,0,.6-.22l2-3.46a.5.5,0,0,0-.12-.64ZM12,15.5A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/>
</svg>

<!-- Buttons -->
<div class="nav">
    <button onclick="openModal('about')">About</button>
    <button onclick="openModal('contact')">Contact</button>
</div>

<!-- About Modal -->
<div id="about" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('about')">&times;</span>
        <h2>About Me</h2>
        <p>Hi, Anurag here 👋<br>DevOps Engineer passionate.</p>
    </div>
</div>

<!-- Contact Modal -->
<div id="contact" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('contact')">&times;</span>
        <h2>Contact</h2>
        <p>Email: anuraggurumurthy@gmail.com</p>
    </div>
</div>

<script>
    function openModal(id) {
        document.getElementById(id).style.display = "flex";
    }

    function closeModal(id) {
        document.getElementById(id).style.display = "none";
    }

    window.onclick = function(event) {
        const modals = document.querySelectorAll('.modal');
        modals.forEach(modal => {
            if (event.target === modal) {
                modal.style.display = "none";
            }
        });
    }
</script>

</body>
</html>
