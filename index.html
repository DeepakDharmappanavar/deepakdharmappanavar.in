<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: black;
    overflow: hidden;
}

/* 🔥 Responsive Image */
.hero img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

/* 📱 Mobile */
@media (max-width: 768px) {
    .hero img {
        object-fit: contain;
    }
}

/* 🔴 TEXT OVERLAY */
.text-overlay {
    position: absolute;
    top: 35%;
    left: 68%;
    color: white;
    font-size: 20px;
    line-height: 1.5;
}

/* ✨ GLOW EFFECT */
.glow {
    display: inline-block;
    animation: glowAnim 1.2s infinite alternate;
}

@keyframes glowAnim {
    from {
        text-shadow: 0 0 5px red;
    }
    to {
        text-shadow: 0 0 15px red, 0 0 25px red;
    }
}

/* ⚙️ PERFECT ROTATION */
.gear {
    display: inline-block;
    animation: spin 1s linear infinite;
    transform-origin: center;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* 📱 Adjust text for mobile */
@media (max-width: 768px) {
    .text-overlay {
        top: 60%;
        left: 10%;
        font-size: 16px;
    }
}

/* Top Right Buttons */
.nav {
    position: absolute;
    top: 20px;
    right: 30px;
    display: flex;
    gap: 15px;
}

.nav button {
    padding: 10px 18px;
    border: none;
    border-radius: 25px;
    background: rgba(255, 0, 0, 0.15);
    color: white;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: all 0.3s ease;
}

.nav button:hover {
    transform: translateY(-4px) scale(1.05);
    background: rgba(255, 0, 0, 0.6);
    box-shadow: 0 0 15px red;
}

/* Popup Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 100;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    color: white;
    animation: fadeIn 0.4s ease;
}

.close {
    float: right;
    font-size: 20px;
    cursor: pointer;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}
</style>

</head>

<body>

<!-- 🔥 Responsive Logo -->
<picture class="hero">
    <!-- 📱 Mobile -->
    <source media="(max-width: 768px)" srcset="./Logo/MaintainceMobileLogo.png">
    
    <!-- 💻 Desktop -->
    <img src="./Logo/MaintainceWebLogo.png" alt="Maintenance">
</picture>

<!-- 🔴 TEXT -->
<div class="text-overlay">
    <h1 class="title">SITE UNDER<br>MAINTENANCE</h1>
    
    <p>Applying system improvements <span class="glow">🚧</span></p>
    <p>Making everything faster & smarter <span class="glow">⚡</span></p>
    <p>Deployment in progress... <span class="glow">⚙️</span></p>
</div>

<!-- Buttons -->
<div class="nav">
    <button onclick="openModal('about')">About</button>
    <button onclick="openModal('contact')">Contact</button>
</div>

<!-- About Modal -->
<div id="about" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('about')">&times;</span>
        <h2>About Me</h2>
        <p>Hi, Deepak here 👋<br>DevOps Engineer passionate.</p>
    </div>
</div>

<!-- Contact Modal -->
<div id="contact" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('contact')">&times;</span>
        <h2>Contact</h2>
        <p>Email: deepakdharmappanavar@gmail.com</p>
    </div>
</div>

<script>
function openModal(id) {
    document.getElementById(id).style.display = "flex";
}

function closeModal(id) {
    document.getElementById(id).style.display = "none";
}

window.onclick = function(event) {
    const modals = document.querySelectorAll('.modal');
    modals.forEach(modal => {
        if (event.target === modal) {
            modal.style.display = "none";
        }
    });
}
</script>

</body>
</html>
